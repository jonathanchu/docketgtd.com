<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- V2: Purple branded - purple bg, white cards, colored accents -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7f78ff"/>
      <stop offset="1" stop-color="#5246cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg2)"/>

  <!-- Vertical spine -->
  <rect x="200" y="180" width="40" height="664" rx="20" fill="rgba(255,255,255,0.3)"/>

  <!-- Spine dots -->
  <circle cx="220" cy="320" r="14" fill="rgba(255,255,255,0.5)"/>
  <circle cx="220" cy="512" r="14" fill="rgba(255,255,255,0.5)"/>
  <circle cx="220" cy="704" r="14" fill="rgba(255,255,255,0.5)"/>

  <!-- Top card -->
  <rect x="280" y="230" width="520" height="160" rx="28" fill="rgba(255,255,255,0.95)"/>
  <path d="M350 310l30 30L450 270" stroke="#4caf80" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="500" y="298" width="240" height="24" rx="12" fill="#b0b0c0"/>

  <!-- Middle card -->
  <rect x="280" y="425" width="520" height="160" rx="28" fill="rgba(255,255,255,0.85)"/>
  <g stroke="#88c0d0" stroke-width="20" stroke-linecap="round" fill="none">
    <line x1="370" y1="465" x2="370" y2="545"/>
    <line x1="335" y1="485" x2="405" y2="525"/>
    <line x1="405" y1="485" x2="335" y2="525"/>
  </g>
  <rect x="440" y="493" width="300" height="24" rx="12" fill="#b0b0c0"/>

  <!-- Bottom card -->
  <rect x="280" y="620" width="520" height="160" rx="28" fill="rgba(255,255,255,0.75)"/>
  <g stroke="#7fbf7f" stroke-width="20" stroke-linecap="round" fill="none">
    <line x1="350" y1="660" x2="350" y2="740"/>
    <line x1="390" y1="660" x2="390" y2="740"/>
    <line x1="330" y1="685" x2="410" y2="685"/>
    <line x1="330" y1="715" x2="410" y2="715"/>
  </g>
  <rect x="440" y="688" width="300" height="24" rx="12" fill="#b0b0c0"/>
</svg>

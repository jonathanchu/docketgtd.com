<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Vertical spine bar -->
  <rect x="12" y="8" width="4" height="48" rx="2" fill="#6c63ff"/>

  <!-- Top card (completed - white/light with checkmark) -->
  <rect x="20" y="10" width="34" height="12" rx="3" fill="#e8e6df"/>

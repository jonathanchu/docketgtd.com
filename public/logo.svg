  <rect x="36" y="15" width="14" height="2" rx="1" fill="#c8c5ba"/>

  <!-- Middle card (in-progress - blue with asterisk as strokes) -->
  <rect x="20" y="26" width="34" height="12" rx="3" fill="#88c0d0"/>
  <g stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="27" y1="28.5" x2="27" y2="35.5"/>
    <line x1="24.2" y1="30" x2="29.8" y2="34"/>
    <line x1="29.8" y1="30" x2="24.2" y2="34"/>
  </g>
  <rect x="33" y="31" width="16" height="2" rx="1" fill="rgba(255,255,255,0.6)"/>


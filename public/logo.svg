    <line x1="24" y1="49.5" x2="30" y2="49.5"/>
  </g>
  <rect x="33" y="47" width="16" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Connector dots on spine -->
  <circle cx="14" cy="16" r="1.5" fill="#8a82ff"/>
  <circle cx="14" cy="32" r="1.5" fill="#8a82ff"/>
  <circle cx="14" cy="48" r="1.5" fill="#8a82ff"/>

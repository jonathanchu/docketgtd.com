  <rect x="20" y="42" width="34" height="12" rx="3" fill="#7fbf7f"/>
  <g stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="25.5" y1="44.5" x2="25.5" y2="51.5"/>
    <line x1="28.5" y1="44.5" x2="28.5" y2="51.5"/>

[build]
  command = "npm run build"
  publish = "dist"

# Redirect getdocketapp.com → docketgtd.com (all paths)
[[redirects]]
  from = "https://getdocketapp.com/*"
  to = "https://docketgtd.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.getdocketapp.com/*"
  to = "https://docketgtd.com/:splat"
  status = 301
  force = true
